<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Task Management</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    margin:20px;
}

.container{
    max-width:1200px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h1{
    color:#1b5e20;
}

.search{
    width:300px;
    padding:10px;
    margin-bottom:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th{
    background:#1b5e20;
    color:white;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    vertical-align:top;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
}

.edit-btn{
    background:#0d6efd;
}

.delete-btn{
    background:#dc3545;
}

.back-btn{
    background:#6c757d;
    margin-top:20px;
}

.save-btn{
    background:#198754;
    width:100%;
    margin-top:15px;
}

.modal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
    overflow:auto;
}

.modal-content{
    background:white;
    width:90%;
    max-width:800px;
    margin:40px auto;
    padding:25px;
    border-radius:10px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

input,
select,
textarea{
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    width:100%;
}

textarea{
    min-height:90px;
    resize:vertical;
}

.full{
    grid-column:span 2;
}

.close{
    float:right;
    font-size:24px;
    cursor:pointer;
}

#message{
    margin-top:15px;
    font-weight:bold;
    color:green;
}
</style>
</head>

<body>

<div class="container">

<h1>Task Management</h1>

<input
    type="text"
    id="search"
    class="search"
    placeholder="Search task..."
    onkeyup="filterTable()">

<table>
<thead>
<tr>
    <th>No.</th>
    <th>Staff</th>
    <th>Vehicle</th>
    <th>Target Activity</th>
    <th>Status</th>
    <th>%</th>
    <th>Action</th>
</tr>
</thead>

<tbody id="taskBody">
</tbody>
</table>

<button class="back-btn" onclick="window.location.href='dashboard.html'">
    Back to Dashboard
</button>

<div id="message"></div>

</div>

<div id="editModal" class="modal">

<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<h2>Edit Task</h2>

<div class="form-grid">

    <input type="hidden" id="editNo">

    <div>
        <label>Staff</label>
        <select id="editStaff"></select>
    </div>

    <div>
        <label>Position</label>
        <input type="text" id="editPosition" readonly>
    </div>

    <div>
        <label>Vehicle / Equipment</label>
        <select id="editVehicle"></select>
    </div>

    <div>
        <label>Status</label>
        <select id="editStatus">
            <option>Planned</option>
            <option>Ongoing</option>
            <option>Finished</option>
            <option>Delayed</option>
            <option>Waiting for Parts</option>
        </select>
    </div>

    <div>
        <label>Start Date</label>
        <input type="date" id="editStartDate">
    </div>

    <div>
        <label>Target Completion</label>
        <input type="date" id="editTargetCompletion">
    </div>

    <div>
        <label>% Completion</label>
        <select id="editPercent">
            <option></option>
            <option>0%</option>
            <option>25%</option>
            <option>50%</option>
            <option>75%</option>
            <option>100%</option>
        </select>
    </div>

    <div class="full">
        <label>Target Activity</label>
        <textarea id="editTarget"></textarea>
    </div>

    <div class="full">
        <label>Actual Accomplishment</label>
        <textarea id="editActual"></textarea>
    </div>

    <div class="full">
        <label>Remarks</label>
        <textarea id="editRemarks"></textarea>
    </div>

</div>

<button class="save-btn" onclick="saveTaskEdit()">
    Save Changes
</button>

</div>

</div>

<script src="js/auth-check.js"></script>
<script>
allowRoles(["Admin"]);
</script>
<script src="js/task-management.js"></script>

</body>
</html>
