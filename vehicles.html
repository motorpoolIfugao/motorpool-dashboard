<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vehicle Status Monitoring</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/gov-theme.css?v=1">

<style>
.vehicle-card{
    background:white;
    padding:25px;
    border-radius:12px;
    border:1px solid #d9e2dc;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.vehicle-card h2{
    margin-top:0;
    color:#0b4f2f;
    text-transform:uppercase;
}

#vehicleForm{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-bottom:25px;
}

input,
select{
    padding:11px;
    border:1px solid #ccc;
    border-radius:6px;
    width:100%;
}

button{
    padding:10px 14px;
    border:none;
    background:#0b4f2f;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#083b24;
}

.full{
    grid-column:span 2;
}

.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#0b4f2f;
    color:white;
    text-transform:uppercase;
    font-size:13px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

.status{
    padding:5px 10px;
    border-radius:20px;
    color:white;
    font-weight:bold;
    display:inline-block;
    font-size:12px;
}

.Operational{
    background:#198754;
}

.Under-Repair{
    background:#fd7e14;
}

.Waiting-for-Parts{
    background:#0d6efd;
}

.For-PMS{
    background:#6f42c1;
}

.Unserviceable{
    background:#dc3545;
}

#message{
    margin-top:10px;
    font-weight:bold;
    color:green;
}

@media(max-width:700px){
    #vehicleForm{
        grid-template-columns:1fr;
    }

    .full{
        grid-column:span 1;
    }
}
</style>
</head>

<body>

<div class="dashboard-layout">

    <div id="sidebarContainer"></div>

    <main class="main-content">

        <header class="top-header">
            <h1>Vehicle Status Monitoring</h1>
            <p>Register vehicles and monitor their operational status.</p>
        </header>

        <section class="content-area">

            <div class="vehicle-card">

                <h2>Add / Update Vehicle Record</h2>

                <form id="vehicleForm">

                    <input
                        type="text"
                        id="plateNo"
                        placeholder="Plate No."
                        required>

                    <input
                        type="text"
                        id="vehicleName"
                        placeholder="Vehicle / Equipment"
                        required>

                    <input
                        type="text"
                        id="department"
                        placeholder="Department / Office">

                    <select id="status">
                        <option>Operational</option>
                        <option>Under Repair</option>
                        <option>Waiting for Parts</option>
                        <option>For PMS</option>
                        <option>Unserviceable</option>
                    </select>

                    <button class="full" type="submit">
                        Save Vehicle
                    </button>

                </form>

                <div id="message"></div>

                <h2>Vehicle List</h2>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Vehicle ID</th>
                                <th>Plate No.</th>
                                <th>Vehicle / Equipment</th>
                                <th>Department</th>
                                <th>Current Status</th>
                                <th>Update Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>

                        <tbody id="vehicleBody"></tbody>
                    </table>
                </div>

            </div>

        </section>

    </main>

</div>

<script src="js/auth-check.js?v=4"></script>
<script>
allowRoles(["Admin", "Supervisor"]);
</script>
<script src="js/sidebar.js?v=3"></script>
<script src="js/vehicles.js?v=5"></script>

</body>
</html>
