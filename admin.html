<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Motorpool Admin Panel</title>

<link rel="stylesheet" href="css/gov-theme.css?v=1">

<style>
.form-card{
    max-width:900px;
    background:white;
    padding:25px;
    border-radius:12px;
    border:1px solid #d9e2dc;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.form-card h2{
    margin-top:0;
    color:#0b4f2f;
    text-transform:uppercase;
}

#taskForm{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

#taskForm input,
#taskForm select,
#taskForm textarea{
    padding:11px;
    border:1px solid #ccc;
    border-radius:6px;
    width:100%;
}

#taskForm textarea{
    grid-column:span 2;
    resize:vertical;
}

#taskForm button{
    grid-column:span 2;
    padding:12px;
    border:none;
    background:#0b4f2f;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

#taskForm button:hover{
    background:#083b24;
}

#message{
    margin-top:15px;
    font-weight:bold;
    color:green;
}

@media(max-width:700px){
    #taskForm{
        grid-template-columns:1fr;
    }

    #taskForm textarea,
    #taskForm button{
        grid-column:span 1;
    }
}
</style>

</head>

<body>

<div class="dashboard-layout">

    <div id="sidebarContainer"></div>

    <main class="main-content">

        <header class="top-header">
            <h1>Admin Panel</h1>
            <p>Create weekly work plan tasks for motorpool personnel.</p>
        </header>

        <section class="content-area">

            <div class="form-card">

                <h2>Add Weekly Work Plan</h2>

                <form id="taskForm">

                    <select id="staff" required>
                        <option value="">Select Staff</option>
                    </select>

                    <input
                        type="text"
                        id="position"
                        placeholder="Position"
                        readonly>

                    <select id="vehicle" required>
                        <option value="">Select Vehicle / Equipment</option>
                    </select>

                    <select id="status">
                        <option>Planned</option>
                        <option>Ongoing</option>
                        <option>Finished</option>
                        <option>Delayed</option>
                        <option>Waiting for Parts</option>
                    </select>

                    <input
                        type="date"
                        id="startDate"
                        required>

                    <input
                        type="date"
                        id="targetCompletion"
                        required>

                    <textarea
                        id="target"
                        rows="4"
                        placeholder="Target Activity"
                        required></textarea>

                    <button type="submit">
                        Save Task
                    </button>

                </form>

                <div id="message"></div>

            </div>

        </section>

    </main>

</div>

<script src="js/auth-check.js?v=4"></script>

<script>
allowRoles(["Admin"]);
</script>

<script src="js/sidebar.js?v=1"></script>
<script src="js/admin.js?v=5"></script>

</body>
</html>
