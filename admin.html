<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/gov-theme.css?v=1">
<title>Motorpool Admin Panel</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
}

.main{
    width:90%;
    max-width:900px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

h1{
    margin-bottom:20px;
    color:#1b5e20;
}

form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

input,
select,
textarea{
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

textarea{
    grid-column:span 2;
    resize:vertical;
}

button{
    grid-column:span 2;
    padding:12px;
    border:none;
    background:#1b5e20;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2e7d32;
}

#message{
    margin-top:15px;
    font-weight:bold;
    color:green;
}

</style>

</head>
<body>

<div class="main">

<h1>Add Weekly Work Plan</h1>

<form id="taskForm">

<select id="staff" required>
    <option value="">Select Staff</option>
</select>

<input
    type="text"
    id="position"
    placeholder="Position"
    readonly>

<select id="vehicle" required>
    <option value="">Select Vehicle / Equipment</option>
</select>

<select id="status">
    <option>Planned</option>
    <option>Ongoing</option>
    <option>Finished</option>
    <option>Delayed</option>
    <option>Waiting for Parts</option>
</select>

<input
    type="date"
    id="startDate"
    required>

<input
    type="date"
    id="targetCompletion"
    required>

<textarea
    id="target"
    rows="4"
    placeholder="Target Activity"
    required></textarea>

<button type="submit">
    Save Task
</button>


</form>

<div id="message"></div>

</div>

<script src="js/admin.js"></script>
<script src="js/auth-check.js"></script>
<script>
allowRoles(["Admin"]);
</script>
<script src="js/admin.js"></script>

</body>
</html>
