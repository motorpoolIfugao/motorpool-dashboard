<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Motorpool Login</title>
<link rel="stylesheet" href="css/gov-theme.css?v=1">
<style>
body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.login-box{
    background:white;
    padding:30px;
    width:350px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#1b5e20;
}

input{
    width:100%;
    padding:12px;
    margin-top:12px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    margin-top:18px;
    background:#1b5e20;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#2e7d32;
}

#message{
    margin-top:15px;
    color:red;
    text-align:center;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Motorpool Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="message"></div>

</div>

<script src="js/login.js"></script>

</body>
</html>
