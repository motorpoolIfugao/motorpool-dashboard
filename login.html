<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Motorpool Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/gov-theme.css?v=1">

<style>
body{
    margin:0;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0b4f2f,#1f3a5f);
    display:flex;
    align-items:center;
    justify-content:center;
}

.login-wrapper{
    width:100%;
    max-width:430px;
    padding:20px;
}

.login-card{
    background:white;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
    border-top:6px solid #d4af37;
}

.login-header{
    background:#0b4f2f;
    color:white;
    text-align:center;
    padding:28px 22px;
}

.login-seal{
    width:76px;
    height:76px;
    border-radius:50%;
    background:white;
    color:#0b4f2f;
    border:4px solid #d4af37;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:22px;
    margin:0 auto 14px;
}

.login-header h1{
    margin:0;
    font-size:23px;
    text-transform:uppercase;
    letter-spacing:.04em;
}

.login-header p{
    margin:8px 0 0;
    font-size:13px;
    color:#e5f4ec;
}

.login-body{
    padding:28px;
}

.form-group{
    margin-bottom:16px;
}

.form-group label{
    display:block;
    font-weight:bold;
    font-size:13px;
    margin-bottom:6px;
    color:#1f2933;
}

.form-group input{
    width:100%;
    padding:12px;
    border:1px solid #d9e2dc;
    border-radius:8px;
    font-size:15px;
}

.form-group input:focus{
    outline:none;
    border-color:#0b4f2f;
    box-shadow:0 0 0 3px rgba(11,79,47,.15);
}

.login-btn{
    width:100%;
    background:#0b4f2f;
    color:white;
    border:none;
    padding:13px;
    border-radius:8px;
    font-weight:bold;
    font-size:15px;
    cursor:pointer;
    margin-top:5px;
}

.login-btn:hover{
    background:#083b24;
}

.message{
    margin-top:14px;
    text-align:center;
    font-weight:bold;
    color:#dc3545;
}

.login-footer{
    text-align:center;
    font-size:12px;
    color:#6b7280;
    padding:0 28px 24px;
}

.system-note{
    margin-top:18px;
    text-align:center;
    color:#eef7f1;
    font-size:12px;
}
</style>
</head>

<body>

<div class="login-wrapper">

    <div class="login-card">

        <div class="login-header">
            <div class="login-seal">IFG</div>
            <h1>Motorpool Management System</h1>
            <p>Province of Ifugao · Provincial Motorpool</p>
        </div>

        <div class="login-body">

            <form id="loginForm">

                <div class="form-group">
                    <label for="username">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Enter username"
                        autocomplete="username"
                        required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter password"
                        autocomplete="current-password"
                        required>
                </div>

                <button type="submit" class="login-btn">
                    Login
                </button>

                <div id="message" class="message"></div>

            </form>

        </div>

        <div class="login-footer">
            Authorized personnel only. Please log out after using the system.
        </div>

    </div>

    <div class="system-note">
        Republic of the Philippines · Office of the Provincial Engineer
    </div>

</div>

<script src="js/login.js?v=2"></script>

</body>
</html>
