<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Task Entry</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/gov-theme.css?v=1">

<style>
.form-card{
    max-width:850px;
    background:white;
    padding:25px;
    border-radius:12px;
    border:1px solid #d9e2dc;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.form-card h2{
    margin-top:0;
    color:#0b4f2f;
    text-transform:uppercase;
}

.page-user{
    background:#eef7f1;
    border-left:5px solid #0b4f2f;
    padding:10px 12px;
    border-radius:6px;
    color:#1f2933;
    font-weight:bold;
}

#employeeTaskForm{
    margin-top:18px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group.full{
    grid-column:span 2;
}

label{
    font-weight:bold;
    margin-bottom:6px;
    color:#1f2933;
}

input,
select,
textarea{
    width:100%;
    padding:11px;
    border:1px solid #ccc;
    border-radius:6px;
}

textarea{
    height:120px;
    resize:vertical;
}

.submit-btn{
    grid-column:span 2;
    padding:12px;
    border:none;
    background:#0b4f2f;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.submit-btn:hover{
    background:#083b24;
}

#message{
    margin-top:15px;
    font-weight:bold;
    color:green;
}

@media(max-width:700px){
    #employeeTaskForm{
        grid-template-columns:1fr;
    }

    .form-group.full,
    .submit-btn{
        grid-column:span 1;
    }
}
</style>
</head>

<body>

<div class="dashboard-layout">

    <div id="sidebarContainer"></div>

    <main class="main-content">

        <header class="top-header">
            <h1>Submit My Task</h1>
            <p>Submit your weekly target activity for monitoring and reporting.</p>
        </header>

        <section class="content-area">

            <div class="form-card">

                <h2>My Weekly Task Entry</h2>

                <p id="userInfo" class="page-user"></p>

                <form id="employeeTaskForm">

                    <div class="form-group">
                        <label>Staff Name</label>
                        <input type="text" id="staff" readonly>
                    </div>

                    <div class="form-group">
                        <label>Position</label>
                        <input type="text" id="position" readonly>
                    </div>

                    <div class="form-group full">
                        <label>Vehicle / Equipment</label>
                        <select id="vehicle" required>
                            <option value="">Select Vehicle / Equipment</option>
                        </select>
                    </div>

                    <div class="form-group full">
                        <label>Target Activity</label>
                        <textarea id="target" placeholder="Enter your target activity for the week..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Start Date</label>
                        <input type="date" id="startDate" required>
                    </div>

                    <div class="form-group">
                        <label>Target Completion</label>
                        <input type="date" id="targetCompletion" required>
                    </div>

                    <div class="form-group full">
                        <label>Status</label>
                        <select id="status">
                            <option>Planned</option>
                            <option>Ongoing</option>
                        </select>
                    </div>

                    <button type="submit" class="submit-btn">
                        Submit Task
                    </button>

                </form>

                <div id="message"></div>

            </div>

        </section>

    </main>

</div>

<script src="js/auth-check.js?v=4"></script>

<script>
allowRoles(["Admin", "Supervisor", "Mechanic"]);
</script>

<script src="js/sidebar.js?v=1"></script>

<script>
const apiUrl =
"https://script.google.com/macros/s/AKfycby_b_Wqi3toY94kYQhajzMzZDTZx4g3dB6-S5HoUmBf6TcfzhmevxYylo77-HO6tNGU/exec";

const loggedInName = localStorage.getItem("fullName");
const loggedInRole = localStorage.getItem("role");

document.getElementById("staff").value = loggedInName;

document.getElementById("userInfo").innerText =
    "Logged in as: " +
    loggedInName +
    " (" +
    loggedInRole +
    ")";

document
.getElementById("employeeTaskForm")
.addEventListener("submit", submitTask);

loadStaffPosition();
loadVehicles();

async function loadStaffPosition(){

    const response =
        await fetch(apiUrl + "?action=staff");

    const staffList =
        await response.json();

    const staff =
        staffList.find(person =>
            String(person["Staff Name"]).trim().toLowerCase() ===
            String(loggedInName).trim().toLowerCase()
        );

    if(staff){
        document.getElementById("position").value =
            staff["Position"] || "";
    }else{
        document.getElementById("position").value =
            loggedInRole;
    }
}

async function loadVehicles(){

    const response =
        await fetch(apiUrl + "?action=vehicles");

    const vehicles =
        await response.json();

    const vehicleSelect =
        document.getElementById("vehicle");

    vehicles.forEach(vehicle => {

        vehicleSelect.innerHTML += `
            <option value="${vehicle["Vehicle/Equipment"]}">
                ${vehicle["Vehicle/Equipment"]} - ${vehicle["Plate No."]}
            </option>
        `;
    });
}

async function submitTask(e){

    e.preventDefault();

    const task = {
        action: "create",
        staff: document.getElementById("staff").value,
        position: document.getElementById("position").value,
        vehicle: document.getElementById("vehicle").value,
        target: document.getElementById("target").value,
        startDate: document.getElementById("startDate").value,
        targetCompletion: document.getElementById("targetCompletion").value,
        status: document.getElementById("status").value
    };

    try{

        await fetch(apiUrl,{
            method:"POST",
            mode:"no-cors",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(task)
        });

        document.getElementById("message").innerHTML =
            "Task submitted successfully.";

        document.getElementById("employeeTaskForm").reset();

        document.getElementById("staff").value = loggedInName;

        loadStaffPosition();

    }catch(error){

        console.error(error);

        document.getElementById("message").innerHTML =
            "Error submitting task.";
    }
}
</script>

</body>
</html>
