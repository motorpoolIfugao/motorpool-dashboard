<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Update Task</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/gov-theme.css?v=1">

<style>
.update-card{
    max-width:850px;
    background:white;
    padding:25px;
    border-radius:12px;
    border:1px solid #d9e2dc;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.update-card h2{
    margin-top:0;
    color:#0b4f2f;
    text-transform:uppercase;
}

.info-box{
    background:#eef7f1;
    padding:15px;
    border-left:5px solid #0b4f2f;
    margin-bottom:20px;
    border-radius:6px;
}

.info-box p{
    margin:8px 0;
}

.form-group{
    margin-bottom:14px;
}

label{
    font-weight:bold;
    display:block;
    margin-bottom:6px;
    color:#1f2933;
}

input,
select,
textarea{
    width:100%;
    padding:11px;
    border:1px solid #ccc;
    border-radius:6px;
}

textarea{
    height:110px;
    resize:vertical;
}

.save-btn{
    width:100%;
    padding:12px;
    margin-top:8px;
    background:#0b4f2f;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

.save-btn:hover{
    background:#083b24;
}

#message{
    margin-top:15px;
    font-weight:bold;
    color:green;
}
</style>
</head>

<body>

<div class="dashboard-layout">

    <div id="sidebarContainer"></div>

    <main class="main-content">

        <header class="top-header">
            <h1>Update Task Progress</h1>
            <p>Update actual accomplishment, status, completion percentage, and remarks.</p>
        </header>

        <section class="content-area">

            <div class="update-card">

                <h2>Task Progress Form</h2>

                <div class="info-box">
                    <p><strong>Task No.:</strong> <span id="displayNo"></span></p>
                    <p><strong>Staff:</strong> <span id="displayStaff"></span></p>
                    <p><strong>Vehicle/Equipment:</strong> <span id="displayVehicle"></span></p>
                    <p><strong>Target Activity:</strong> <span id="displayTarget"></span></p>
                </div>

                <input type="hidden" id="taskNo">

                <div class="form-group">
                    <label>Actual Accomplishment</label>
                    <textarea id="actual" placeholder="Describe actual work completed..."></textarea>
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option>Planned</option>
                        <option>Ongoing</option>
                        <option>Finished</option>
                        <option>Delayed</option>
                        <option>Waiting for Parts</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>% Completion</label>
                    <select id="percent">
                        <option>0%</option>
                        <option>25%</option>
                        <option>50%</option>
                        <option>75%</option>
                        <option>100%</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Remarks</label>
                    <textarea id="remarks" placeholder="Additional remarks..."></textarea>
                </div>

                <button onclick="saveUpdate()" class="save-btn">
                    Save Update
                </button>

                <div id="message"></div>

            </div>

        </section>

    </main>

</div>

<script src="js/auth-check.js?v=4"></script>

<script>
allowRoles(["Admin", "Supervisor", "Mechanic"]);
</script>

<script src="js/sidebar.js?v=1"></script>
<script src="js/update.js?v=5"></script>

</body>
</html>
