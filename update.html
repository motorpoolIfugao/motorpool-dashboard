<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Update Task</title>
<link rel="stylesheet" href="css/gov-theme.css?v=1">
<style>
body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
}

.main{
    width:90%;
    max-width:800px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h2{
    color:#1b5e20;
}

.info-box{
    background:#f1f8f4;
    padding:15px;
    border-left:5px solid #1b5e20;
    margin-bottom:20px;
}

label{
    font-weight:bold;
    display:block;
    margin-top:12px;
}

input,
select,
textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

textarea{
    height:110px;
    resize:vertical;
}

button{
    width:100%;
    padding:12px;
    margin-top:18px;
    background:#198754;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#157347;
}

.back-btn{
    background:#6c757d;
}

#message{
    margin-top:15px;
    font-weight:bold;
    color:green;
}
</style>
</head>

<body>

<div class="main">

<h2>Update Task Progress</h2>

<div class="info-box">
    <p><strong>Task No.:</strong> <span id="displayNo"></span></p>
    <p><strong>Staff:</strong> <span id="displayStaff"></span></p>
    <p><strong>Vehicle/Equipment:</strong> <span id="displayVehicle"></span></p>
    <p><strong>Target Activity:</strong> <span id="displayTarget"></span></p>
</div>

<input type="hidden" id="taskNo">

<label>Actual Accomplishment</label>
<textarea id="actual" placeholder="Describe actual work completed..."></textarea>

<label>Status</label>
<select id="status">
    <option>Planned</option>
    <option>Ongoing</option>
    <option>Finished</option>
    <option>Delayed</option>
    <option>Waiting for Parts</option>
</select>

<label>% Completion</label>
<select id="percent">
    <option>0%</option>
    <option>25%</option>
    <option>50%</option>
    <option>75%</option>
    <option>100%</option>
</select>

<label>Remarks</label>
<textarea id="remarks" placeholder="Additional remarks..."></textarea>

<button onclick="saveUpdate()">Save Update</button>

<button class="back-btn" onclick="window.location.href='dashboard.html'">
    Back to Dashboard
</button>

<div id="message"></div>

</div>

<script src="js/update.js"></script>
<script src="js/auth-check.js"></script>
<script>
allowRoles(["Admin", "Supervisor", "Mechanic"]);
</script>
<script src="js/update.js"></script>

</body>
</html>
