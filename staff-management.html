<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Staff Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/gov-theme.css?v=1">

<style>
.staff-card{
    background:white;
    padding:25px;
    border-radius:12px;
    border:1px solid #d9e2dc;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
    margin-bottom:22px;
}

.staff-card h2{
    margin-top:0;
    color:#0b4f2f;
    text-transform:uppercase;
}

.note{
    background:#eef7f1;
    border-left:5px solid #0b4f2f;
    padding:10px 12px;
    border-radius:6px;
    margin-bottom:15px;
    color:#1f2933;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    font-weight:bold;
    margin-bottom:6px;
    color:#1f2933;
}

input,
select{
    padding:11px;
    border:1px solid #ccc;
    border-radius:6px;
    width:100%;
}

.full{
    grid-column:span 2;
}

.button-row{
    display:flex;
    gap:10px;
    margin-top:18px;
    flex-wrap:wrap;
}

button{
    padding:11px 14px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.save-btn{
    background:#0b4f2f;
    color:white;
}

.save-btn:hover{
    background:#083b24;
}

.clear-btn{
    background:#6c757d;
    color:white;
}

.edit-btn{
    background:#0d6efd;
    color:white;
    padding:7px 10px;
}

.status-active{
    color:#198754;
    font-weight:bold;
}

.status-inactive{
    color:#dc3545;
    font-weight:bold;
}

.search{
    width:320px;
    max-width:100%;
    padding:11px;
    border:1px solid #ccc;
    border-radius:6px;
    margin-bottom:15px;
}

.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#0b4f2f;
    color:white;
    padding:11px;
    text-transform:uppercase;
    font-size:13px;
}

td{
    border:1px solid #ddd;
    padding:10px;
    font-size:14px;
}

tr:nth-child(even){
    background:#f9fbfa;
}

#message{
    margin-top:15px;
    font-weight:bold;
    color:green;
}

@media(max-width:700px){
    .form-grid{
        grid-template-columns:1fr;
    }

    .full{
        grid-column:span 1;
    }
}
</style>
</head>

<body>

<div class="dashboard-layout">

    <div id="sidebarContainer"></div>

    <main class="main-content">

        <header class="top-header">
            <h1>Staff Management</h1>
            <p>Add, edit, activate, or deactivate motorpool personnel.</p>
        </header>

        <section class="content-area">

            <div class="staff-card">

                <h2 id="formTitle">Add New Staff</h2>

                <div class="note">
                    Staff names should match the Full Name in User Management so the position will load correctly when submitting tasks.
                </div>

                <form id="staffForm">

                    <input type="hidden" id="staffId">

                    <div class="form-grid">

                        <div class="form-group full">
                            <label>Staff Name</label>
                            <input type="text" id="staffName" required>
                        </div>

                        <div class="form-group">
                            <label>Position</label>
                            <input type="text" id="position" placeholder="Mechanic / Driver / Supervisor" required>
                        </div>

                        <div class="form-group">
                            <label>Status</label>
                            <select id="status" required>
                                <option>Active</option>
                                <option>Inactive</option>
                            </select>
                        </div>

                    </div>

                    <div class="button-row">
                        <button type="submit" class="save-btn">
                            Save Staff
                        </button>

                        <button type="button" class="clear-btn" onclick="clearForm()">
                            Clear Form
                        </button>
                    </div>

                </form>

                <div id="message"></div>

            </div>

            <div class="staff-card">

                <h2>Staff List</h2>

                <input
                    type="text"
                    id="search"
                    class="search"
                    placeholder="Search staff..."
                    onkeyup="filterStaff()">

                <div class="table-wrapper">

                    <table id="staffTable">

                        <thead>
                            <tr>
                                <th>Staff ID</th>
                                <th>Staff Name</th>
                                <th>Position</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>

                        <tbody id="staffBody"></tbody>

                    </table>

                </div>

            </div>

        </section>

    </main>

</div>

<script src="js/auth-check.js?v=4"></script>

<script>
allowRoles(["Admin"]);
</script>

<script src="js/sidebar.js?v=3"></script>

<script>
const apiUrl =
"https://script.google.com/macros/s/AKfycby_b_Wqi3toY94kYQhajzMzZDTZx4g3dB6-S5HoUmBf6TcfzhmevxYylo77-HO6tNGU/exec";

let staffList = [];

document
.getElementById("staffForm")
.addEventListener("submit", saveStaff);

loadStaff();

async function loadStaff(){

    const staffBody =
        document.getElementById("staffBody");

    staffBody.innerHTML = `
        <tr>
            <td colspan="5" style="text-align:center;">
                Loading staff...
            </td>
        </tr>
    `;

    try{

        const response =
            await fetch(apiUrl + "?action=staff");

        staffList =
            await response.json();

        renderStaff();

    }catch(error){

        console.error(error);

        staffBody.innerHTML = `
            <tr>
                <td colspan="5" style="text-align:center;color:red;">
                    Error loading staff.
                </td>
            </tr>
        `;
    }
}

function renderStaff(){

    const staffBody =
        document.getElementById("staffBody");

    staffBody.innerHTML = "";

    if(staffList.length === 0){

        staffBody.innerHTML = `
            <tr>
                <td colspan="5" style="text-align:center;">
                    No staff found.
                </td>
            </tr>
        `;

        return;
    }

    staffList.forEach(staff => {

        const staffId =
            staff["Staff ID"] || "";

        const staffName =
            staff["Staff Name"] || "";

        const position =
            staff["Position"] || "";

        const status =
            staff["Status"] || "";

        const statusClass =
            status === "Active"
            ? "status-active"
            : "status-inactive";

        staffBody.innerHTML += `
            <tr>
                <td>${staffId}</td>
                <td>${staffName}</td>
                <td>${position}</td>
                <td class="${statusClass}">${status}</td>
                <td>
                    <button class="edit-btn" onclick="editStaff('${staffId}')">
                        Edit
                    </button>
                </td>
            </tr>
        `;
    });
}

function editStaff(staffId){

    const staff =
        staffList.find(item =>
            String(item["Staff ID"]) === String(staffId)
        );

    if(!staff){
        alert("Staff not found.");
        return;
    }

    document.getElementById("formTitle").innerText =
        "Edit Staff";

    document.getElementById("staffId").value =
        staff["Staff ID"] || "";

    document.getElementById("staffName").value =
        staff["Staff Name"] || "";

    document.getElementById("position").value =
        staff["Position"] || "";

    document.getElementById("status").value =
        staff["Status"] || "Active";

    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
}

async function saveStaff(e){

    e.preventDefault();

    const staffId =
        document.getElementById("staffId").value;

    const staffName =
        document.getElementById("staffName").value.trim();

    const position =
        document.getElementById("position").value.trim();

    const status =
        document.getElementById("status").value;

    const message =
        document.getElementById("message");

    const request = {
        action: staffId ? "updateStaff" : "createStaff",
        staffId: staffId,
        staffName: staffName,
        position: position,
        status: status
    };

    try{

        await fetch(apiUrl,{
            method:"POST",
            mode:"no-cors",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(request)
        });

        message.style.color = "green";
        message.innerText =
            "Staff saved. Refreshing list...";

        clearForm();

        setTimeout(loadStaff, 1000);

    }catch(error){

        console.error(error);

        message.style.color = "red";
        message.innerText =
            "Error saving staff.";
    }
}

function clearForm(){

    document.getElementById("formTitle").innerText =
        "Add New Staff";

    document.getElementById("staffId").value = "";
    document.getElementById("staffName").value = "";
    document.getElementById("position").value = "";
    document.getElementById("status").value = "Active";
}

function filterStaff(){

    const input =
        document.getElementById("search")
        .value
        .toUpperCase();

    const rows =
        document.querySelectorAll("#staffTable tbody tr");

    rows.forEach(row => {

        const text =
            row.innerText.toUpperCase();

        row.style.display =
            text.includes(input)
            ? ""
            : "none";

    });
}
</script>

</body>
</html>
