<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Motorpool Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/gov-theme.css?v=1">

<style>
.dashboard-card{
    background:white;
    border-radius:12px;
    border:1px solid #d9e2dc;
    box-shadow:0 4px 12px rgba(0,0,0,.07);
    overflow:hidden;
}

.dashboard-tools{
    margin-bottom:18px;
}

.search{
    width:320px;
    max-width:100%;
    padding:11px;
    border:1px solid #d9e2dc;
    border-radius:8px;
}

.card-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:16px;
    margin-bottom:22px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    border:1px solid #d9e2dc;
    border-top:5px solid #0b4f2f;
    box-shadow:0 4px 12px rgba(0,0,0,.07);
}

.card h2{
    margin:0;
    font-size:34px;
    color:#0b4f2f;
}

.card p{
    margin:8px 0 0;
    font-weight:bold;
    color:#6b7280;
}

.table-header{
    padding:16px 20px;
    border-bottom:1px solid #d9e2dc;
}

.table-header h2{
    margin:0;
    color:#0b4f2f;
    font-size:20px;
}

.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0b4f2f;
    color:white;
    padding:11px;
    font-size:13px;
    text-transform:uppercase;
    white-space:nowrap;
}

td{
    border:1px solid #e5e7eb;
    padding:10px;
    font-size:14px;
    vertical-align:top;
}

tr:nth-child(even){
    background:#f9fbfa;
}

tr:hover{
    background:#eef7f1;
}

.status{
    padding:5px 10px;
    border-radius:20px;
    color:white;
    font-weight:bold;
    font-size:12px;
    display:inline-block;
}

.status.Planned{ background:#6c757d; }
.status.Ongoing{ background:#fd7e14; }
.status.Finished{ background:#198754; }
.status.Delayed{ background:#dc3545; }
.status.Waiting-for-Parts{ background:#0d6efd; }

td button{
    background:#0b4f2f;
    color:white;
    border:none;
    padding:8px 10px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

td button:hover{
    background:#083b24;
}
</style>

</head>

<body>

<div class="dashboard-layout">

    <div id="sidebarContainer"></div>

    <main class="main-content">

        <header class="top-header">
            <h1>Motorpool Management Dashboard</h1>
            <p>Weekly Work Plan · Accomplishment Monitoring · Vehicle and Inventory Management</p>
            <p id="userInfo"></p>
        </header>

        <section class="content-area">

            <div class="dashboard-tools">
                <input
                    type="text"
                    id="search"
                    class="search"
                    placeholder="Search staff, vehicle, activity..."
                    onkeyup="filterTable()">
            </div>

            <div class="card-container">

                <div class="card">
                    <h2 id="totalTasks">0</h2>
                    <p>Total Tasks</p>
                </div>

                <div class="card">
                    <h2 id="plannedTasks">0</h2>
                    <p>Planned</p>
                </div>

                <div class="card">
                    <h2 id="ongoingTasks">0</h2>
                    <p>Ongoing</p>
                </div>

                <div class="card">
                    <h2 id="finishedTasks">0</h2>
                    <p>Finished</p>
                </div>

            </div>

            <div class="dashboard-card">

                <div class="table-header">
                    <h2>Weekly Work Plan</h2>
                </div>

                <div class="table-wrapper">

                    <table id="taskTable">

                        <thead>
                            <tr>
                                <th>No.</th>
                                <th>Staff</th>
                                <th>Position</th>
                                <th>Vehicle</th>
                                <th>Target Activity</th>
                                <th>Start Date</th>
                                <th>Target Completion</th>
                                <th>Status</th>
                                <th>% Completion</th>
                                <th>Remarks</th>
                                <th>Action</th>
                            </tr>
                        </thead>

                        <tbody id="tableBody"></tbody>

                    </table>

                </div>

            </div>

        </section>

    </main>

</div>

<script src="js/auth-check.js?v=4"></script>

<script>
allowRoles(["Admin", "Supervisor", "Mechanic", "Viewer"]);
</script>

<script src="js/sidebar.js?v=3"></script>
<script src="js/dashboard.js?v=6"></script>

</body>
</html>
