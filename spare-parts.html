<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Spare Parts Monitoring</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/gov-theme.css?v=1">

<style>
.parts-card{
    background:white;
    padding:25px;
    border-radius:12px;
    border:1px solid #d9e2dc;
    box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.parts-card h2{
    margin-top:0;
    color:#0b4f2f;
    text-transform:uppercase;
}

#partsForm{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-bottom:25px;
}

input,
select{
    padding:11px;
    border:1px solid #ccc;
    border-radius:6px;
    width:100%;
}

button{
    padding:12px;
    border:none;
    background:#0b4f2f;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#083b24;
}

.full{
    grid-column:span 2;
}

.table-wrapper{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th{
    background:#0b4f2f;
    color:white;
    text-transform:uppercase;
    font-size:13px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

.status{
    padding:5px 10px;
    border-radius:20px;
    color:white;
    font-weight:bold;
    font-size:12px;
}

.status.Pending{
    background:#fd7e14;
}

.status.Available{
    background:#198754;
}

.status.Cancelled{
    background:#dc3545;
}

#message{
    margin-top:10px;
    font-weight:bold;
    color:green;
}

@media(max-width:700px){
    #partsForm{
        grid-template-columns:1fr;
    }

    .full{
        grid-column:span 1;
    }
}
</style>
</head>

<body>

<div class="dashboard-layout">

    <div id="sidebarContainer"></div>

    <main class="main-content">

        <header class="top-header">
            <h1>Spare Parts Monitoring</h1>
            <p>Record and monitor requested spare parts for vehicle repair and maintenance.</p>
        </header>

        <section class="content-area">

            <div class="parts-card">

                <h2>Spare Parts Request Form</h2>

                <form id="partsForm">

                    <input type="date" id="dateRequested" required>

                    <select id="vehicle" required>
                        <option value="">Select Vehicle / Equipment</option>
                    </select>

                    <input type="text" id="partNeeded" placeholder="Part Needed" required>

                    <input type="number" id="quantity" placeholder="Quantity" required>

                    <select id="status">
                        <option>Pending</option>
                        <option>Available</option>
                        <option>Cancelled</option>
                    </select>

                    <button class="full" type="submit">
                        Save Spare Part Request
                    </button>

                </form>

                <div id="message"></div>

                <h2>Parts Request List</h2>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Date Requested</th>
                                <th>Vehicle</th>
                                <th>Part Needed</th>
                                <th>Quantity</th>
                                <th>Status</th>
                            </tr>
                        </thead>

                        <tbody id="partsBody"></tbody>
                    </table>
                </div>

            </div>

        </section>

    </main>

</div>

<script src="js/auth-check.js?v=4"></script>
<script>
allowRoles(["Admin", "Supervisor"]);
</script>
<script src="js/sidebar.js?v=3"></script>
<script src="js/spare-parts.js?v=5"></script>

</body>
</html>
